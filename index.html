<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Notificaciones de Eventos</title>
  
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f7fb;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 350px;
      width: 100%;
    }
    h1 { color: #1e293b; font-size: 24px; margin-bottom: 10px; }
    p { color: #64748b; font-size: 15px; line-height: 1.5; margin-bottom: 25px; }
    
    .btn-notificacion {
      background-color: #2563eb;
      color: white;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      transition: background-color 0.2s;
    }
    .btn-notificacion:hover {
      background-color: #1d4ed8;
    }
  </style>

  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "024a03b7-02f0-478d-b18f-6a0e4ce23291",
        // ESTA LINEA INDICA A ONESIGNAL LA RUTA EXACTA DE TU PROYECTO
        serviceWorkerParam: { scope: "/eventos/" },
        serviceWorkerPath: "OneSignalSDKWorker.js"
      });
    });

    function suscribirse() {
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(function(OneSignal) {
        // Forzamos al sistema a lanzar el aviso ignorando cualquier bloqueo previo
        OneSignal.showSlidedownPrompt({ force: true });
      });
    }
  </script>
</head>
<body>
 
  <div class="card">
    <h1>Alertas de Eventos</h1>
    <p>Suscríbete para recibir notificaciones push en tiempo real en tu teléfono móvil cada vez que publiquemos un nuevo evento.</p>
    <button onclick="suscribirse()" class="btn-notificacion">🔔 Activar Notificaciones</button>
  </div>
 
</body>
</html>
